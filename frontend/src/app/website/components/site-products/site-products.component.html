<section id="products" class="bg-white py-16 sm:py-20">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
      <div class="max-w-2xl">
        <p class="text-xs font-bold tracking-[0.2em] text-pcmazing-500 uppercase">Our Products</p>
        <h2 class="mt-2 text-3xl font-extrabold text-slate-900 sm:text-4xl">QUALITY TECH PRODUCTS</h2>
        <p class="mt-4 text-base leading-relaxed text-slate-500">
          From processors and graphics cards to laptops and accessories — we stock quality
          computer parts and devices for every need and budget.
        </p>
      </div>
      <a
        routerLink="/contact"
        class="hidden shrink-0 items-center gap-2 self-start rounded-md bg-pcmazing-500 px-6 py-3.5 text-sm font-bold tracking-wide text-white transition-colors hover:bg-pcmazing-600 lg:inline-flex"
      >
        VIEW ALL PRODUCTS <span aria-hidden="true">→</span>
      </a>
    </div>

    <div class="mt-10 grid grid-cols-2 gap-4 sm:grid-cols-3 sm:gap-6 lg:grid-cols-6">
      @for (product of products; track product.title) {
        <article class="group text-center">
          <div class="overflow-hidden rounded-xl border border-gray-100 bg-gray-50 p-4 transition-shadow group-hover:shadow-md sm:p-6">
            <img
              [src]="product.image"
              [alt]="product.title"
              class="mx-auto h-24 w-full object-contain transition-transform duration-200 group-hover:scale-105 sm:h-28"
              width="160"
              height="128"
              loading="lazy"
            />
          </div>
          <h3 class="mt-3 text-sm font-bold text-slate-900 sm:text-base">{{ product.title }}</h3>
        </article>
      }
    </div>

    <div class="mt-8 flex justify-center lg:hidden">
      <a
        routerLink="/contact"
        class="inline-flex w-full items-center justify-center gap-2 rounded-md bg-pcmazing-500 px-6 py-3.5 text-sm font-bold tracking-wide text-white hover:bg-pcmazing-600 sm:w-auto"
      >
        VIEW ALL PRODUCTS <span aria-hidden="true">→</span>
      </a>
    </div>
  </div>
</section>
