<section class="relative overflow-hidden bg-gradient-to-br from-slate-900 via-slate-800 to-pcmazing-900 py-16 sm:py-20">
  <div class="pointer-events-none absolute inset-0 opacity-30">
    <div class="absolute -top-24 -right-24 size-96 rounded-full bg-pcmazing-500 blur-3xl"></div>
    <div class="absolute -bottom-24 -left-24 size-80 rounded-full bg-pcmazing-400 blur-3xl"></div>
  </div>

  <div class="relative mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    @if (eyebrow()) {
      <p class="text-xs font-bold tracking-[0.2em] text-pcmazing-300 uppercase">{{ eyebrow() }}</p>
    }
    <h1 class="mt-2 max-w-3xl text-3xl font-extrabold tracking-tight text-white sm:text-4xl lg:text-5xl">
      {{ title() }}
    </h1>
    @if (description()) {
      <p class="mt-4 max-w-2xl text-base leading-relaxed text-slate-300 sm:text-lg">
        {{ description() }}
      </p>
    }
  </div>
</section>
