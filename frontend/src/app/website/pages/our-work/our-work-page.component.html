<app-page-hero
  eyebrow="Portfolio"
  title="View Our Work"
  description="Explore the business systems and web solutions PCmazing has built for clients across retail, automotive, catering, warehouse, finance, and HR."
/>

<section class="bg-gray-50 py-16 sm:py-20">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="mb-10 text-center sm:mb-14">
      <p class="text-xs font-bold tracking-[0.2em] text-pcmazing-500 uppercase">PCmazing Projects</p>
      <h2 class="mt-2 text-3xl font-extrabold text-slate-900 sm:text-4xl">Systems We Have Built</h2>
    </div>

    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      @for (project of projects; track project.title) {
        <article
          class="group flex flex-col overflow-hidden rounded-2xl border border-gray-100 bg-white shadow-sm transition-all duration-300 hover:-translate-y-1 hover:border-pcmazing-200 hover:shadow-xl"
        >
          <div class="bg-gradient-to-br from-pcmazing-500 to-pcmazing-700 px-6 py-8">
            <p class="text-xs font-bold tracking-[0.15em] text-white/70 uppercase">{{ project.category }}</p>
            <h3 class="mt-2 text-lg font-bold text-white">{{ project.title }}</h3>
          </div>
          <div class="flex flex-1 flex-col p-6">
            <p class="flex-1 text-sm leading-relaxed text-slate-500">{{ project.description }}</p>
            <div class="mt-5 flex flex-wrap gap-2">
              @for (tag of project.tags; track tag) {
                <span class="rounded-full bg-pcmazing-50 px-3 py-1 text-xs font-semibold text-pcmazing-600">
                  {{ tag }}
                </span>
              }
            </div>
          </div>
        </article>
      }
    </div>

    <div class="mt-14 text-center">
      <p class="text-sm text-slate-500">Interested in a similar solution for your business?</p>
      <a
        routerLink="/"
        fragment="contact"
        class="mt-4 inline-flex items-center gap-2 rounded-md bg-pcmazing-500 px-6 py-3 text-sm font-bold tracking-wide text-white transition-colors hover:bg-pcmazing-600"
      >
        START YOUR PROJECT <span aria-hidden="true">→</span>
      </a>
    </div>
  </div>
</section>
