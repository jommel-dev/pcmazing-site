<section class="flex min-h-screen items-center justify-center bg-slate-950 px-4 py-16">
  <div class="w-full max-w-md rounded-3xl border border-white/10 bg-white p-8 shadow-2xl">
    <p class="text-xs font-bold tracking-[0.2em] text-pcmazing-500 uppercase">PCMazing Internal</p>
    <h1 class="mt-3 text-2xl font-bold text-slate-900">Staff Access Verification</h1>
    <p class="mt-2 text-sm leading-relaxed text-slate-500">
      Enter the PCMazing staff passcode to continue to the administrative login page.
    </p>

    @if (notice()) {
      <div class="mt-5 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">
        {{ notice() }}
      </div>
    }

    @if (error()) {
      <div class="mt-5 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ error() }}
      </div>
    }

    <form class="mt-6 space-y-5" (ngSubmit)="submit()">
      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-700" for="staff-passcode">Staff passcode</label>
        <input
          id="staff-passcode"
          type="password"
          class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm text-slate-900 focus:border-pcmazing-500 focus:ring-2 focus:ring-pcmazing-100 focus:outline-none"
          placeholder="Enter staff passcode"
          [ngModel]="passcode()"
          (ngModelChange)="passcode.set($event)"
          name="passcode"
          autocomplete="off"
          required
        />
      </div>

      <button
        type="submit"
        class="inline-flex w-full items-center justify-center rounded-xl bg-pcmazing-500 px-5 py-3 text-sm font-bold tracking-wide text-white hover:bg-pcmazing-600 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="loading() || !passcode().trim()"
      >
        {{ loading() ? 'VERIFYING...' : 'CONTINUE TO LOGIN' }}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-500">
      <a routerLink="/" class="font-semibold text-pcmazing-500 hover:text-pcmazing-600">Back to website</a>
    </p>
  </div>
</section>
