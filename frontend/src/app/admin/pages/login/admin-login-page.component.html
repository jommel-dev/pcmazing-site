<section class="flex min-h-screen items-center justify-center bg-slate-950 px-4 py-16">
  <div class="w-full max-w-md rounded-3xl border border-white/10 bg-white p-8 shadow-2xl">
    <p class="text-xs font-bold tracking-[0.2em] text-pcmazing-500 uppercase">PCMazing Admin</p>
    <h1 class="mt-3 text-2xl font-bold text-slate-900">Internal System Login</h1>
    <p class="mt-2 text-sm leading-relaxed text-slate-500">
      Sign in with your PCMazing administrative account.
    </p>

    @if (error()) {
      <div class="mt-5 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ error() }}
      </div>
    }

    <form class="mt-6 space-y-5" (ngSubmit)="submit()">
      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-700" for="admin-username">Username</label>
        <input
          id="admin-username"
          type="text"
          class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm text-slate-900 focus:border-pcmazing-500 focus:ring-2 focus:ring-pcmazing-100 focus:outline-none"
          placeholder="Enter username"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          name="username"
          autocomplete="username"
          required
        />
      </div>

      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-700" for="admin-password">Password</label>
        <div class="relative">
          <input
            id="admin-password"
            [type]="showPassword() ? 'text' : 'password'"
            class="w-full rounded-xl border border-gray-200 px-4 py-3 pr-12 text-sm text-slate-900 focus:border-pcmazing-500 focus:ring-2 focus:ring-pcmazing-100 focus:outline-none"
            placeholder="Enter password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
            autocomplete="current-password"
            required
          />
          <button
            type="button"
            class="absolute inset-y-0 right-0 px-4 text-xs font-bold text-slate-400 hover:text-slate-600"
            (click)="showPassword.set(!showPassword())"
          >
            {{ showPassword() ? 'HIDE' : 'SHOW' }}
          </button>
        </div>
      </div>

      <label class="flex items-center gap-2 text-sm text-slate-600">
        <input
          type="checkbox"
          class="size-4 rounded border-gray-300 text-pcmazing-500 focus:ring-pcmazing-500"
          [checked]="rememberMe()"
          (change)="rememberMe.set($any($event.target).checked)"
        />
        Remember me on this device
      </label>

      <button
        type="submit"
        class="inline-flex w-full items-center justify-center rounded-xl bg-pcmazing-500 px-5 py-3 text-sm font-bold tracking-wide text-white hover:bg-pcmazing-600 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="loading() || !username().trim() || !password().trim()"
      >
        {{ loading() ? 'SIGNING IN...' : 'SIGN IN' }}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-500">
      <a routerLink="/admin/access" class="font-semibold text-pcmazing-500 hover:text-pcmazing-600">Use a different staff passcode</a>
    </p>
  </div>
</section>
